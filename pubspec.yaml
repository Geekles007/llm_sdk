name: llm_sdk
description: >-
  Interface unifiée pour parler aux LLM (Claude, OpenAI, Gemini) depuis
  Dart/Flutter : multi-provider, streaming, tool calling, sorties structurées.
version: 0.3.1
repository: https://github.com/geekles007/llm_sdk
issue_tracker: https://github.com/geekles007/llm_sdk/issues

topics:
  - llm
  - ai
  - claude
  - openai
  - gemini

screenshots:
  - description: "Changer de provider (Claude, OpenAI, Gemini) tient en une ligne."
    path: doc/swap.gif
  - description: "Streaming mot à mot via streamText (effet machine à écrire)."
    path: doc/stream.gif

environment:
  sdk: ^3.11.5

dependencies:
  http: ^1.2.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
