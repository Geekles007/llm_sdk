name: llm_sdk
description: >-
  Unified interface for talking to LLMs (Claude, OpenAI, Gemini) from
  Dart/Flutter: multi-provider, streaming, tool calling, structured outputs.
version: 0.4.0
repository: https://github.com/geekles007/llm_sdk
issue_tracker: https://github.com/geekles007/llm_sdk/issues

topics:
  - llm
  - ai
  - claude
  - openai
  - gemini

screenshots:
  - description: "Switching provider (Claude, OpenAI, Gemini) is a one-line change."
    path: doc/swap.gif
  - description: "Word-by-word streaming via streamText (typewriter effect)."
    path: doc/stream.gif

environment:
  sdk: ^3.11.5

dependencies:
  http: ^1.2.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
